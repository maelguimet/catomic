name: Run footer path fix

on:
  pull_request:
    branches:
      - master
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write

jobs:
  apply-fix:
    if: github.head_ref == 'agent/footer-uniform-path-215'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          show-progress: false

      - name: Extract and apply focused fix
        shell: bash
        run: |
          set +e
          python3 - <<'PY' > /tmp/agent-footer-extract.log 2>&1
          from pathlib import Path

          workflow = Path('.github/workflows/agent-footer-fix.yml').read_text().splitlines()
          start = next(i for i, line in enumerate(workflow) if line.strip() == "python3 - <<'PY'") + 1
          end = next(i for i in range(start, len(workflow)) if workflow[i].strip() == 'PY')
          source = workflow[start:end]
          first = next(line for line in source if line.strip())
          indent = len(first) - len(first.lstrip())
          prefix = ' ' * indent
          script = []
          in_triple = False
          for line in source:
              if in_triple:
                  script.append(line)
              else:
                  script.append(line[indent:] if line.startswith(prefix) else line)
              if line.count('"""') % 2 == 1:
                  in_triple = not in_triple
          if in_triple:
              raise SystemExit('unterminated triple-quoted string in embedded fix')
          script_text = '\n'.join(script) + '\n'
          old = 'path = "src/terminal/render.rs"\ntext = read(path)\nif text.count("status_filename") != 2:'
          new = old.replace('!= 2:', '!= 3:')
          if script_text.count(old) != 1:
              raise SystemExit('could not patch terminal render status span count')
          script_text = script_text.replace(old, new, 1)
          Path('/tmp/agent_footer_fix.py').write_text(script_text)
          PY
          extract_status=$?
          if [ "$extract_status" -ne 0 ]; then
            cp /tmp/agent-footer-extract.log agent-footer-fix-error.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add agent-footer-fix-error.txt
            git commit -m "Record footer fix extraction failure" || true
            git push origin HEAD:${{ github.head_ref }} || true
            cat /tmp/agent-footer-extract.log
            exit "$extract_status"
          fi

          python3 /tmp/agent_footer_fix.py > /tmp/agent-footer-fix.log 2>&1
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            cp /tmp/agent-footer-fix.log agent-footer-fix-error.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add agent-footer-fix-error.txt
            git commit -m "Record footer fix workflow failure" || true
            git push origin HEAD:${{ github.head_ref }} || true
            cat /tmp/agent-footer-fix.log
            exit "$status"
          fi
          rm -f agent-footer-fix-error.txt agent-footer-fix-verify-error.txt
          rm .github/workflows/agent-footer-fix-pr.yml

      - name: Verify focused change
        shell: bash
        run: |
          set +e
          (
            set -e
            cargo fmt --all -- --check
            cargo test --locked app::status
            cargo test --locked config::theme
            cargo test --locked terminal::render::status_bar
            python3 scripts/check_markdown_links.py
            git diff --check
            test -z "$(git status --short | grep -vE '^( M| D|\?\?) (README.md|docs/user-guide.md|src/app/render.rs|src/app/status.rs|src/config/config_template.toml|src/config/theme.rs|src/config/theme/tests.rs|src/terminal/render.rs|src/terminal/render/status_bar.rs|src/terminal/render/status_bar/tests.rs|.github/workflows/agent-footer-fix.yml|.github/workflows/agent-footer-fix-pr.yml|agent-footer-fix-error.txt|agent-footer-fix-verify-error.txt)$')"
          ) > /tmp/agent-footer-verify.log 2>&1
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            cp /tmp/agent-footer-verify.log agent-footer-fix-verify-error.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add agent-footer-fix-verify-error.txt
            git commit -m "Record footer fix verification failure" || true
            git push origin HEAD:${{ github.head_ref }} || true
            cat /tmp/agent-footer-verify.log
            exit "$status"
          fi

      - name: Commit fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Underline the footer path without highlighting the cat"
          git push origin HEAD:${{ github.head_ref }}
