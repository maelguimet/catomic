name: Apply footer path styling fix

on:
  push:
    branches:
      - agent/footer-uniform-path-215

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/footer-uniform-path-215
          fetch-depth: 0

      - name: Apply focused fix
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          def read(path: str) -> str:
              return Path(path).read_text()

          def write(path: str, text: str) -> None:
              Path(path).write_text(text)

          def replace_once(text: str, old: str, new: str, path: str) -> str:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected one occurrence, found {count}: {old!r}")
              return text.replace(old, new, 1)

          # The status formatter now marks the complete displayed path, excluding the cat brand.
          path = "src/app/status.rs"
          text = read(path)
          text = replace_once(
              text,
              "//! Owns: pure path formatting, filename spans, and semantic status role selection.",
              "//! Owns: pure path formatting, displayed-path spans, and semantic status role selection.",
              path,
          )
          text = replace_once(
              text,
              "//! Invariants: [untitled] represents no path; the basename span is a valid UTF-8\n//!   boundary; output is terminal-safe and never wider than the supplied width.",
              "//! Invariants: [untitled] represents no path; the displayed-path span is a valid UTF-8\n//!   boundary; output is terminal-safe and never wider than the supplied width.",
              path,
          )
          text = replace_once(text, "    pub(crate) filename: (usize, usize),", "    pub(crate) path: (usize, usize),", path)
          text = replace_once(text, "            filename: (0, 0),", "            path: (0, 0),", path)
          text = replace_once(
              text,
              "    let mut text = format!(\"{brand}{parent}\");\n    let start = text.len();\n    text.push_str(&filename);\n    let end = text.len();",
              "    let mut text = brand.to_string();\n    let start = text.len();\n    text.push_str(&parent);\n    text.push_str(&filename);\n    let end = text.len();",
              path,
          )
          text = replace_once(text, "        filename: (start, end),", "        path: (start, end),", path)
          text = text.replace("status.filename", "status.path")
          text = text.replace("without_cat.filename", "without_cat.path")
          text = replace_once(
              text,
              "        assert_eq!(\n            &status.text[status.path.0..status.path.1],\n            \"notes.txt\"\n        );",
              "        assert_eq!(\n            &status.text[status.path.0..status.path.1],\n            \"/work/cats/notes.txt\"\n        );",
              path,
          )
          text = replace_once(
              text,
              "        assert_eq!(\n            &status.text[status.path.0..status.path.1],\n            \"猫-notes.txt\"\n        );\n        assert!(status.text.starts_with('…'), \"status: {}\", status.text);",
              "        let displayed_path = &status.text[status.path.0..status.path.1];\n        assert_eq!(displayed_path, status.text);\n        assert!(\n            displayed_path.ends_with(\"猫-notes.txt\"),\n            \"path: {displayed_path}\"\n        );\n        assert!(status.text.starts_with('…'), \"status: {}\", status.text);",
              path,
          )
          write(path, text)

          # Carry the renamed path span through app and terminal presentation state.
          path = "src/app/render.rs"
          text = read(path)
          if text.count("status_filename") != 2:
              raise SystemExit(f"{path}: unexpected status_filename count")
          text = text.replace("status_filename", "status_path")
          text = replace_once(text, "Some(status.filename)", "Some(status.path)", path)
          write(path, text)

          path = "src/terminal/render.rs"
          text = read(path)
          if text.count("status_filename") != 2:
              raise SystemExit(f"{path}: unexpected status_filename count")
          text = text.replace("status_filename", "status_path")
          text = replace_once(text, "                filename: options.status_path,", "                path: options.status_path,", path)
          text = replace_once(text, "                filename: None,", "                path: None,", path)
          write(path, text)

          # Render the path as a plain underline. The old generated bold+underline value is
          # recognized narrowly and normalized so existing generated configs lose the artifact.
          path = "src/terminal/render/status_bar.rs"
          text = read(path)
          text = replace_once(
              text,
              "//! Owns: status roles, filename/selection spans, terminal fallback, and row painting.",
              "//! Owns: status roles, path/selection spans, terminal fallback, and row painting.",
              path,
          )
          text = replace_once(
              text,
              "    const fn emphasized_default() -> Self {\n        Self {\n            foreground: Some(Color::Reset),\n            background: None,\n            bold: true,\n            dim: false,\n            underlined: true,\n            reversed: false,\n        }\n    }",
              "    const fn underlined_default() -> Self {\n        Self {\n            foreground: Some(Color::Reset),\n            background: None,\n            bold: false,\n            dim: false,\n            underlined: true,\n            reversed: false,\n        }\n    }",
              path,
          )
          text = re.sub(r"\bfilename\b", "path", text)
          text = text.replace("filename_style", "path_style")
          text = replace_once(text, "path: StatusStyle::emphasized_default(),", "path: StatusStyle::underlined_default(),", path)
          text = replace_once(
              text,
              "            path: StatusStyle {\n                foreground: None,\n                background: None,\n                bold: true,\n                dim: false,\n                underlined: false,\n                reversed: false,\n            },",
              "            path: StatusStyle {\n                foreground: None,\n                background: None,\n                bold: false,\n                dim: false,\n                underlined: true,\n                reversed: false,\n            },",
              path,
          )
          text = replace_once(
              text,
              "            path: themed_status_style(\n                theme.status_filename,\n                theme.truecolor,\n                fallback.path,\n            ),",
              "            path: persistent_path_style(\n                theme.status_filename,\n                theme.truecolor,\n                fallback.path,\n            ),",
              path,
          )
          themed = """fn themed_status_style(style: ThemeStyle, truecolor: bool, fallback: StatusStyle) -> StatusStyle {
    if style.fg.is_none()
        && style.bg.is_none()
        && style.bold.is_none()
        && style.dim.is_none()
        && style.underlined.is_none()
        && style.reversed.is_none()
    {
        return fallback;
    }
    StatusStyle {
        foreground: style.fg.map(|color| terminal_color(color, truecolor)),
        background: style.bg.map(|color| terminal_color(color, truecolor)),
        bold: style.bold.unwrap_or(false),
        dim: style.dim.unwrap_or(false),
        underlined: style.underlined.unwrap_or(false),
        reversed: style.reversed.unwrap_or(false),
    }
}
"""
          compatibility = themed + """
fn persistent_path_style(
    style: ThemeStyle,
    truecolor: bool,
    fallback: StatusStyle,
) -> StatusStyle {
    let legacy_generated = ThemeStyle {
        fg: Some(ThemeColor::Default),
        bold: Some(true),
        underlined: Some(true),
        ..ThemeStyle::default()
    };
    let mut resolved = themed_status_style(style, truecolor, fallback);
    if style == legacy_generated {
        resolved.bold = false;
    }
    resolved
}
"""
          text = replace_once(text, themed, compatibility, path)
          write(path, text)

          # Built-in and generated defaults underline without bolding.
          path = "src/config/theme.rs"
          text = read(path)
          text = replace_once(
              text,
              "        status_filename: Style {\n            bold: Some(true),\n            underlined: Some(true),\n            ..Style::fg(Color::Default)\n        },",
              "        status_filename: Style {\n            underlined: Some(true),\n            ..Style::fg(Color::Default)\n        },",
              path,
          )
          write(path, text)

          path = "src/config/theme/tests.rs"
          text = read(path)
          text = replace_once(
              text,
              "            fg: Some(Color::Default),\n            bold: Some(true),\n            underlined: Some(true),",
              "            fg: Some(Color::Default),\n            underlined: Some(true),",
              path,
          )
          write(path, text)

          # Regression coverage: plain cat, complete underlined path, distinct real selection,
          # and compatibility for the previously generated basename style.
          path = "src/terminal/render/status_bar/tests.rs"
          text = read(path)
          text = replace_once(
              text,
              "use crate::buffer::SimpleBuffer;",
              "use crate::buffer::SimpleBuffer;\nuse crate::config::theme::{Color as ThemeColor, Style as ThemeStyle};",
              path,
          )
          old_test = """#[test]
fn persistent_path_uses_terminal_contrast_emphasized_filename_and_selection_reverse_video() {
    let mut out = Vec::new();
    let text = "=^..^=  /work/note.txt";
    write_status_bar(
        &mut out,
        2,
        40,
        text,
        StatusBarPresentation {
            role: StatusRole::Normal,
            theme: StatusTheme::default(),
            filename: Some((14, 22)),
            selection: Some((8, 22)),
        },
    )
    .unwrap();
    let rendered = String::from_utf8(out).unwrap();

    assert!(rendered.contains("\\x1b[39m=^..^=  "));
    assert!(rendered.contains("\\x1b[39m\\x1b[7m/work/"));
    assert!(rendered.contains("\\x1b[39m\\x1b[1m\\x1b[4m\\x1b[7mnote.txt"));
    assert!(!rendered.contains("note.txt                  "));
}
"""
          new_tests = """#[test]
fn persistent_path_underlines_the_complete_path_without_styling_the_cat() {
    let mut out = Vec::new();
    let text = "=^..^=  /work/note.txt";
    write_status_bar(
        &mut out,
        2,
        40,
        text,
        StatusBarPresentation {
            role: StatusRole::Normal,
            theme: StatusTheme::default(),
            path: Some((8, 22)),
            selection: None,
        },
    )
    .unwrap();
    let rendered = String::from_utf8(out).unwrap();

    assert!(rendered.contains("\\x1b[39m=^..^=  "));
    assert!(rendered.contains("\\x1b[39m\\x1b[4m/work/note.txt"));
    assert!(!rendered.contains("\\x1b[4m=^..^="));
    assert!(!rendered.contains("\\x1b[1m"));
    assert!(!rendered.contains("\\x1b[7m"));
}

#[test]
fn persistent_path_selection_adds_reverse_video_only_to_the_selected_text() {
    let mut out = Vec::new();
    let text = "=^..^=  /work/note.txt";
    write_status_bar(
        &mut out,
        2,
        40,
        text,
        StatusBarPresentation {
            role: StatusRole::Normal,
            theme: StatusTheme::default(),
            path: Some((8, 22)),
            selection: Some((8, 14)),
        },
    )
    .unwrap();
    let rendered = String::from_utf8(out).unwrap();

    assert!(rendered.contains("\\x1b[39m=^..^=  "));
    assert!(rendered.contains("\\x1b[39m\\x1b[4m\\x1b[7m/work/"));
    assert!(rendered.contains("\\x1b[39m\\x1b[4mnote.txt"));
    assert!(!rendered.contains("\\x1b[7m=^..^="));
}

#[test]
fn legacy_generated_filename_style_drops_the_old_bold_emphasis() {
    let legacy = ThemeStyle {
        fg: Some(ThemeColor::Default),
        bold: Some(true),
        underlined: Some(true),
        ..ThemeStyle::default()
    };

    assert_eq!(
        persistent_path_style(legacy, false, StatusStyle::underlined_default()),
        StatusStyle::underlined_default()
    );
}
"""
          text = replace_once(text, old_test, new_tests, path)
          write(path, text)

          for path in ["src/config/config_template.toml", "README.md", "docs/user-guide.md"]:
              text = read(path)
              text = replace_once(
                  text,
                  'status_filename = { fg = "default", bold = true, underline = true }',
                  'status_filename = { fg = "default", underline = true }',
                  path,
              )
              write(path, text)

          path = "docs/user-guide.md"
          text = read(path)
          text = replace_once(
              text,
              "The persistent footer uses the terminal's own default foreground/background\npair, so its contrast follows the selected terminal theme instead of assuming a\ndark background. The basename is bold and underlined rather than assigned a\nfixed hue. At four or more rows, a cleared row separates document text from the\nfooter; smaller terminals drop the separator first, then the footer, so the\nediting area never becomes zero-height. Transient messages keep their semantic\nfull-row styles.",
              "The persistent footer uses the terminal's own default foreground/background\npair, so its contrast follows the selected terminal theme instead of assuming a\ndark background. The complete displayed path is underlined while the cat branding\nstays plain; the footer adds no bold, inverse video, or background to the path by\ndefault. The retained `status_filename` theme role styles that complete path span.\nAt four or more rows, a cleared row separates document text from the footer;\nsmaller terminals drop the separator first, then the footer, so the editing area\nnever becomes zero-height. Transient messages keep their semantic full-row styles.",
              path,
          )
          write(path, text)

          # The temporary workflow must not remain in the reviewable branch.
          Path(".github/workflows/agent-footer-fix.yml").unlink()
          PY

      - name: Verify focused change
        shell: bash
        run: |
          cargo fmt --all -- --check
          cargo test --locked app::status
          cargo test --locked config::theme
          cargo test --locked terminal::render::status_bar
          python3 scripts/check_markdown_links.py
          git diff --check
          test -z "$(git status --short | grep -vE '^( M| D) (README.md|docs/user-guide.md|src/app/render.rs|src/app/status.rs|src/config/config_template.toml|src/config/theme.rs|src/config/theme/tests.rs|src/terminal/render.rs|src/terminal/render/status_bar.rs|src/terminal/render/status_bar/tests.rs|.github/workflows/agent-footer-fix.yml)$')"

      - name: Commit fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Underline the footer path without highlighting the cat"
          git push origin HEAD:agent/footer-uniform-path-215
