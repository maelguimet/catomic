name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: Android aarch64 check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install Android Rust target
        run: rustup target add aarch64-linux-android

      - name: Check Termux target
        run: |
          export CC_aarch64_linux_android="$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang"
          export AR_aarch64_linux_android="$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar"
          cargo check --target aarch64-linux-android --bin catomic --locked

  msrv:
    name: Rust 1.87 compatibility
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install minimum supported Rust
        run: rustup toolchain install 1.87.0 --profile minimal

      - name: Check minimum supported Rust
        run: cargo +1.87.0 check --all-targets --locked

  supply-chain:
    name: Dependency security and licenses
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Check advisories, licenses, and sources
        uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2.1.1
        with:
          arguments: --all-features --locked
          command: check
          command-arguments: advisories licenses sources

  verify:
    name: Rust verification
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install stable Rust
        run: rustup toolchain install stable --profile minimal --component clippy,rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check release verifier syntax
        run: bash -n scripts/verify-release.sh

      - name: Check compatibility harness
        run: |
          python3 -m py_compile scripts/compatibility/*.py
          python3 -m unittest discover -s scripts/compatibility -p 'test_*.py' -v
          python3 -c 'import json; json.load(open("docs/compatibility/result-schema-v1.json", encoding="utf-8"))'

      - name: Run Clippy
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Run all tests
        run: cargo test --all-targets --locked

      - name: Build release binary
        run: cargo build --release --locked

      - name: Verify packaged crate
        run: |
          cargo package --locked --list
          cargo package --locked
