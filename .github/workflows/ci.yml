name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  msrv:
    name: Rust 1.87 compatibility
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install minimum supported Rust
        run: rustup toolchain install 1.87.0 --profile minimal

      - name: Check minimum supported Rust
        run: cargo +1.87.0 check --all-targets --locked

  supply-chain:
    name: Dependency security and licenses
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Check advisories, licenses, and sources
        uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2.1.1
        with:
          arguments: --all-features --locked
          command: check
          command-arguments: advisories licenses sources

  verify:
    name: Rust verification
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install stable Rust
        run: rustup toolchain install stable --profile minimal --component clippy,rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Run all tests
        run: cargo test --all-targets --locked

      - name: Run ignored acceptance checks
        run: cargo test --all-targets --locked -- --ignored --test-threads=1 --nocapture

      - name: Build release binary
        run: cargo build --release --locked

      - name: Verify packaged crate
        run: |
          cargo package --locked --list
          cargo package --locked
