# Catomic configuration
#
# This file is user-owned. Catomic never rewrites or migrates it automatically.
# Unknown keys are kept for forward compatibility because Catomic only reads
# configuration. Restart Catomic after saving; settings are applied as one
# validated document at startup, never partially.

[editor]
# Number of spaces in one indentation level (1-16).
tab_size = 4

[big_files]
# Logical lines retained in each editable oversized-file page.
page_lines = 20_000

[files]
# Clean files may reload after a verified external change. Dirty files never do.
auto_reload = true

[cat]
status_messages = true

[recovery]
# Recovery sidecars are private, bounded, and disabled until explicitly enabled.
enabled = false
interval_secs = 30
max_bytes = 1_048_576

[autocomplete]
# Disabled by default. Enabling only opens a per-process confirmation; no
# automatic request starts until Enter confirms the exact destination/scope.
enabled = false
idle_debounce_ms = 750
minimum_prefix_length = 20
max_context_before = 2_048
max_context_after = 512
max_generated_tokens = 64
allow_remote = false

[theme]
# Built-ins: "default", "high-contrast", and "mono".
name = "default"

[theme.colors]
# Each role accepts "default", a 16-color name, a 0-255 index, #RRGGBB,
# rgb(R,G,B), or a { fg, bg, bold, dim, underline, reverse } table. RGB falls back safely when
# truecolor is not advertised by the terminal.
text = "default"
background = "default"
cursor = "default"
selection = { fg = "black", bg = "cyan" }
line_number = "bright-black"
status = { fg = "bright-black", dim = true }
status_filename = "bright-red"
message = { fg = "black", bg = "bright-cyan" }
status_warning = { fg = "black", bg = "bright-yellow", bold = true }
status_prompt = { fg = "bright-white", bg = "blue", bold = true }
error = { fg = "bright-white", bg = "red" }
markdown_heading = "bright-blue"
markdown_emphasis = "magenta"
markdown_code = "green"
markdown_marker = "bright-cyan"
markdown_link = "bright-blue"
syntax_keyword = "magenta"
syntax_string = "green"
syntax_comment = "bright-black"
syntax_number = "yellow"
search_match = { fg = "black", bg = "yellow" }
diff_added = "green"
diff_removed = "red"
llm_changed = { fg = "red", underline = true }
autocomplete = { fg = "bright-black", dim = true }
preview = "default"

# Action-oriented keybindings replace an action's complete default chord list.
# An empty list unbinds an action. Plain printable keys are rejected so a typo
# cannot turn normal typing into a command. Run `catomic config check` to verify.
#
# [keybindings]
# save = ["ctrl+s", "alt+s"]
# copy = ["ctrl+c"]
# interrupt = ["ctrl+shift+c"]
# help = []
# command-prompt = ["ctrl+shift+p", "f2"]
# select-model = ["f10", "alt+m"]

# Extension names are normalized and may include or omit a leading dot.
# [languages.rs]
# tab_size = 4
# linter = "cargo check --message-format short {file}"

# Named commands run only after `run NAME` (or an explicit configured hook).
# They are trusted shell commands, not a sandbox.
# [commands.upper]
# command = "tr '[:lower:]' '[:upper:]'"
# input = "selection"
# output = "replace-input"
# timeout_secs = 10

[hooks]
on_open = []
on_save = []
before_llm = []

# Model settings are inert until an explicit model command and confirmation, or
# the separately confirmed autocomplete session described above.
# F10 opens the searchable process-local selector without reading credentials,
# contacting an endpoint, starting a command, or rewriting this file.
# [llm]
# default = "local"
#
# [[llm.backends]]
# name = "local"
# type = "openai-compatible"
# base_url = "http://127.0.0.1:8080/v1"
# model = "local-model"
# models = ["local-small", "local-large"]
# discovery = false
# timeout_secs = 120
#
# Hosted credentials must come from named environment variables and require
# HTTPS. `headers` is for non-secret metadata; use `header_envs` for secrets.
# [[llm.backends]]
# name = "hosted"
# type = "openai-compatible"
# base_url = "https://models.example/v1"
# model = "provider/model-id"
# api_key_env = "MODEL_API_KEY"
# headers = { "X-Client" = "catomic" }
# header_envs = { "X-Provider-Key" = "PROVIDER_SECONDARY_KEY" }
# timeout_secs = 120
#
# Command adapters receive direct argv and must emit one supported structured
# format. They are trusted user code, not a sandbox; configure text-only mode
# with tools and workspace mutation disabled for the exact installed version.
# [[llm.backends]]
# name = "local-headless"
# type = "command"
# program = "/usr/local/bin/my-headless-model"
# args = ["--structured-output"]
# model = "friendly-model-id"
# input = "stdin-text-v1"
# output = "claude-json-v1" # or "codex-jsonl-v1"
# timeout_secs = 120
#
# F3 uses the active selection, then explicit context blocks, then a bounded
# retained file. Every send and every apply still requires Enter confirmation.
# [llm.inline]
# instruction_prefix = ">>"
# instruction_suffix = ""
# context_open = "<catblock>"
# context_close = "</catblock>"
# warn_lines = 500
# block_mode = "combined" # or "queued"
# queue_limit = 16
# stop_on_error = true
# remove_instruction_after_apply = true
