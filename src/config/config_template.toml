# markdown-preview = ["f6"]
# line-numbers = ["f7"]
# whitespace = ["f8"]
# soft-wrap = ["f9"]
#
# Model actions
# run-clanker = ["f3"]
# clear-clanker-changes = ["shift+f3"]
# select-model = ["f10"]
#
# Prompts and temporary surfaces
# prompt-submit = ["enter"]
# prompt-cancel = ["esc"]
# prompt-delete-backward = ["backspace"]
# search-next = ["enter", "down"]
# search-previous = ["up"]
