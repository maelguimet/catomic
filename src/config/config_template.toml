# Catomic configuration
#
# This file is user-owned. Catomic never rewrites or migrates it automatically.
# Unknown keys are rejected with their full TOML path so typos do not silently
# select defaults. Restart Catomic after saving; settings are applied as one
# validated document at startup, never partially.

[editor]
# Number of spaces in one indentation level (1-16).
tab_size = 4

[big_files]
# Logical lines retained in each editable oversized-file page.
page_lines = 20_000

[files]
# Clean files may reload after a verified external change. Dirty files never do.
auto_reload = true

[view]
# F5 toggles external-reload change highlighting and persists the explicit choice.
external_diff = true
# F7 toggles line numbers and persists the explicit choice.
line_numbers = false

[cat]
status_messages = true

[recovery]
# Recovery sidecars are private, bounded, and disabled until explicitly enabled.
enabled = false
interval_secs = 30
max_bytes = 1_048_576

[autocomplete]
# Disabled by default. Enabling only opens a per-process confirmation; no
# automatic request starts until Enter confirms the exact destination/scope.
enabled = false
idle_debounce_ms = 750
minimum_prefix_length = 20
max_context_before = 2_048
max_context_after = 512
max_generated_tokens = 64
allow_remote = false

[theme]
# Built-ins: "default", "high-contrast", and "mono".
name = "default"

[theme.colors]
# Each role accepts "default", a 16-color name, a 0-255 index, #RRGGBB,
# rgb(R,G,B), or a { fg, bg, bold, dim, underline, reverse } table. RGB falls back safely when
# truecolor is not advertised by the terminal.
text = "default"
background = "default"
cursor = "default"
selection = { fg = "black", bg = "cyan" }
line_number = "bright-black"
status = "default"
status_filename = { fg = "default", bold = true, underline = true }
message = { fg = "black", bg = "bright-cyan" }
status_warning = { fg = "black", bg = "bright-yellow", bold = true }
status_prompt = { fg = "bright-white", bg = "blue", bold = true }
error = { fg = "bright-white", bg = "red" }
markdown_heading = "bright-blue"
markdown_emphasis = "magenta"
markdown_code = "green"
markdown_marker = "bright-cyan"
markdown_link = "bright-blue"
syntax_keyword = "magenta"
syntax_string = "green"
syntax_comment = "bright-black"
syntax_number = "yellow"
search_match = { fg = "black", bg = "yellow" }
diff_added = "green"
diff_removed = "red"
external_added = { fg = "green", underline = true }
external_changed = { fg = "cyan", underline = true }
external_deleted = { fg = "red", bold = true }
llm_changed = { fg = "red", underline = true }
autocomplete = { fg = "bright-black", dim = true }
preview = "default"

# Uncommenting an action replaces its complete built-in default list; [] unbinds it.
# Plain printable keys are rejected so a typo cannot turn normal typing into a
# command. Run `catomic config check` to verify changes.
#
# action-registry-start
# Generated by `catomic config refresh-keybindings`; edits inside this block are
# replaced. Uncommented overrides are preserved and moved above this block.
# [keybindings]
# Global
# help = ["ctrl+h", "f1"]
# quit = ["ctrl+q"]
# interrupt = ["ctrl+shift+c"]
#
# Files and buffers
# save = ["ctrl+s"]
# save-as = ["ctrl+shift+s"]
# open = ["ctrl+o"]
# new = ["ctrl+n"]
# close = ["ctrl+w"]
# reload = ["ctrl+r"]
# previous-buffer = ["alt+pageup"]
# next-buffer = ["alt+pagedown"]
# previous-page = ["ctrl+pageup"]
# next-page = ["ctrl+pagedown"]
#
# Search, commands, and history
# search = ["ctrl+f"]
# replace = ["ctrl+shift+f"]
# goto-line = ["ctrl+g"]
# command-prompt = ["ctrl+shift+p", "f2"]
# complete = ["ctrl+space"]
# undo = ["ctrl+z"]
# redo = ["ctrl+y", "ctrl+shift+z"]
#
# Navigation
# move-left = ["left"]
# move-right = ["right"]
# move-up = ["up"]
# move-down = ["down"]
# line-start = ["home"]
# line-end = ["end"]
# document-start = ["ctrl+home"]
# document-end = ["ctrl+end"]
# viewport-up = ["pageup"]
# viewport-down = ["pagedown"]
# word-left = ["ctrl+left"]
# word-right = ["ctrl+right"]
# paragraph-previous = ["ctrl+up"]
# paragraph-next = ["ctrl+down"]
#
# Selection
# select-left = ["shift+left"]
# select-right = ["shift+right"]
# select-up = ["shift+up"]
# select-down = ["shift+down"]
# select-line-start = ["shift+home"]
# select-line-end = ["shift+end"]
# select-document-start = ["ctrl+shift+home"]
# select-document-end = ["ctrl+shift+end"]
# select-viewport-up = ["shift+pageup"]
# select-viewport-down = ["shift+pagedown"]
# select-word-left = ["ctrl+shift+left", "alt+shift+left"]
# select-word-right = ["ctrl+shift+right", "alt+shift+right"]
# select-all = ["ctrl+a"]
#
# Editing and clipboard
# delete-backward = ["backspace"]
# delete-forward = ["delete"]
# delete-word-backward = ["ctrl+backspace"]
# delete-word-forward = ["ctrl+delete"]
# insert-newline = ["enter"]
# indent = ["tab"]
# unindent = ["shift+tab"]
# toggle-overwrite = ["insert"]
# copy = ["ctrl+c"]
# cut = ["ctrl+x"]
# cut-line = ["ctrl+k"]
# paste = ["ctrl+v"]
#
# View
